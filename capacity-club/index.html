<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Capacity Club — Build more capacity for the life you actually want.</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { margin: 0; padding: 0; }
body {
  background: #F5EEDF;
  color: #1B1714;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { width: 100%; }
.cc-v2 a { color: inherit; text-decoration: none; }
.cc-v2 button { font-family: inherit; cursor: pointer; }

/* ── Buttons ─────────────────────────────────────────────── */
.v2-btn-primary {
  display: inline-block;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease !important;
}
.v2-btn-primary:hover {
  transform: translateY(-3px) scale(1.02) !important;
  box-shadow: 0 10px 28px rgba(27,23,20,0.22) !important;
}
.v2-btn-primary:active {
  transform: translateY(-1px) scale(0.99) !important;
  transition-duration: 0.08s !important;
}

.v2-btn-light {
  display: inline-block;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease, background-color 0.18s ease !important;
}
.v2-btn-light:hover {
  transform: translateY(-3px) scale(1.02) !important;
  box-shadow: 0 12px 36px rgba(245,238,223,0.35) !important;
  background-color: #fffdf8 !important;
}
.v2-btn-light:active {
  transform: translateY(-1px) scale(0.99) !important;
  transition-duration: 0.08s !important;
}

.v2-btn-ghost {
  position: relative;
  overflow: hidden;
}
.v2-btn-ghost::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 0; height: 1.5px;
  background: currentColor;
  border-radius: 2px;
  transition: width 0.26s cubic-bezier(0.4,0,0.2,1);
}
.v2-btn-ghost:hover::after { width: 100%; }
.v2-btn-ghost .v2-arrow {
  display: inline-block;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.v2-btn-ghost:hover .v2-arrow { transform: translateX(4px); }

/* ── Nav links ───────────────────────────────────────────── */
.v2-nav-link {
  position: relative;
  transition: opacity 0.15s ease;
}
.v2-nav-link::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 0; height: 1.5px;
  background: currentColor;
  border-radius: 2px;
  transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
}
.v2-nav-link:hover::after { width: 100%; }

/* ── Outcome cards ───────────────────────────────────────── */
.v2-outcome-card {
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  cursor: default;
}
.v2-outcome-card:hover { transform: translateY(-8px); }
.v2-outcome-card .v2-card-img {
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.v2-outcome-card:hover .v2-card-img { transform: scale(1.05); }

/* ── Testimonial cards ───────────────────────────────────── */
.v2-testi-card {
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease !important;
}
.v2-testi-card:hover {
  transform: translateY(-5px) !important;
  box-shadow: 0 1px 0 rgba(27,23,20,.06), 0 20px 48px rgba(27,23,20,.3) !important;
}

/* ── Step items ──────────────────────────────────────────── */
.v2-step-item {
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  cursor: default;
}
.v2-step-item:hover { transform: translateY(-5px); }
.v2-step-item:hover .v2-step-dot {
  transform: scale(1.15);
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.v2-step-dot {
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
}

/* ── Feature pills ───────────────────────────────────────── */
.v2-feature-pill {
  border-radius: 12px;
  padding: 10px 8px;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), background 0.18s ease;
}
.v2-feature-pill:hover {
  transform: translateY(-3px);
  background: rgba(27,23,20,0.05);
}

/* ── Sticker spin ────────────────────────────────────────── */
@keyframes v2-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.v2-sticker-spin {
  animation: v2-spin 22s linear infinite;
  transform-origin: center;
}
.v2-sticker-spin:hover { animation-duration: 5s; }

/* ── Logo dot pulse ──────────────────────────────────────── */
@keyframes v2-pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.55); opacity:0.7; } }
.v2-logo-dot { animation: v2-pulse 2.8s ease-in-out infinite; }

/* ── Scroll reveal ───────────────────────────────────────── */
.v2-scroll-reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.v2-scroll-reveal.v2-visible { opacity: 1; transform: translateY(0); }

/* ── Stagger grid ────────────────────────────────────────── */
.v2-stagger > * {
  opacity: 0;
  transform: translateY(22px);
  transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1), transform 0.55s cubic-bezier(0.4,0,0.2,1);
}
.v2-stagger.v2-visible > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0.04s; }
.v2-stagger.v2-visible > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:0.12s; }
.v2-stagger.v2-visible > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:0.20s; }
.v2-stagger.v2-visible > *:nth-child(4) { opacity:1; transform:translateY(0); transition-delay:0.28s; }
.v2-stagger.v2-visible > *:nth-child(5) { opacity:1; transform:translateY(0); transition-delay:0.36s; }
.v2-stagger.v2-visible > *:nth-child(6) { opacity:1; transform:translateY(0); transition-delay:0.44s; }

/* ── Hero parallax img ───────────────────────────────────── */
.v2-hero-parallax { will-change: transform; }

/* ── Who-for list item hover ─────────────────────────────── */
.v2-reason-item {
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.v2-reason-item:hover { transform: translateX(4px); }
.v2-reason-item:hover .v2-check-dot { transform: scale(1.2); }
.v2-check-dot { transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }

/* ── Hamburger ───────────────────────────────────────────── */
.v2-hamburger { display: none !important; }

/* ── 960px tablet ────────────────────────────────────────── */
@media (max-width: 960px) {
  .v2-hero-img      { display: none !important; }
  .v2-problem-grid  { grid-template-columns: 1fr 1fr !important; }
  .v2-problem-col3  { display: none !important; }
  .v2-outcomes-grid { grid-template-columns: 1fr !important; }
  .v2-outcomes-cards { grid-template-columns: repeat(2, 1fr) !important; }
  .v2-testi-badge   { display: none !important; }
  .v2-testi-cards   { grid-template-columns: repeat(2, 1fr) !important; }
  .v2-whofor-plant  { display: none !important; }
  .v2-cta-grid      { grid-template-columns: 1fr !important; }
  .v2-nav-links     { display: none !important; }
  .v2-nav-cta       { display: none !important; }
  .v2-hamburger     { display: flex !important; }
  .v2-tracks-grid   { grid-template-columns: repeat(2, 1fr) !important; }
  .v2-next-grid     { grid-template-columns: 1fr !important; }
  .v2-indent        { margin-left: 0 !important; }
  .v2-reasons-grid  { grid-template-columns: repeat(3, 1fr) !important; }
}

/* ── 600px mobile ─────────────────────────────────────────── */
@media (max-width: 600px) {
  /* Layout */
  .v2-problem-grid   { grid-template-columns: 1fr !important; padding-left: 0 !important; gap: 24px !important; }
  .v2-problem-squiggle { display: none !important; }
  /* Habit cards → horizontal swipe carousel */
  .v2-outcomes-cards {
    display: flex !important;
    flex-direction: row !important;
    overflow-x: auto !important;
    scroll-snap-type: x mandatory !important;
    -webkit-overflow-scrolling: touch !important;
    gap: 14px !important;
    padding-bottom: 8px !important;
    scrollbar-width: none !important;
  }
  .v2-outcomes-cards::-webkit-scrollbar { display: none !important; }
  .v2-outcomes-cards > * {
    flex: 0 0 82% !important;
    scroll-snap-align: start !important;
  }
  .v2-testi-cards    { grid-template-columns: 1fr !important; }
  .v2-tracks-grid    { grid-template-columns: 1fr !important; }
  .v2-reasons-grid   { grid-template-columns: 1fr !important; }
  .v2-next-grid      { grid-template-columns: 1fr !important; }
  /* Spacing */
  .v2-wrap-mobile    { padding-left: 24px !important; padding-right: 24px !important; }
  .v2-section-mobile { padding-top: 64px !important; padding-bottom: 64px !important; }
  /* Hero — fix bleed padding */
  .v2-hero-section   { min-height: auto !important; }
  .v2-hero-inner     { padding: 60px 24px 72px !important; }
  .v2-hero-h1        { font-size: clamp(44px, 12vw, 64px) !important; line-height: 0.98 !important; }
  .v2-hero-pills     { display: none !important; }
  /* Results */
  .v2-stat-num       { font-size: 60px !important; }
  .v2-stat-row       { grid-template-columns: 110px 1fr 18px !important; gap: 0 14px !important; }
  /* Testimonials */
  .v2-testi-card     { padding: 28px 24px 24px !important; }
  .v2-testi-quote    { font-size: 18px !important; line-height: 1.45 !important; }
  /* CTA full-width */
  .v2-cta-btn-full   { width: 100% !important; min-width: 0 !important; }
  /* No hover lifts on touch */
  .v2-step-item:hover, .v2-outcome-card:hover, .v2-testi-card:hover { transform: none !important; box-shadow: none !important; }
  /* Reasons grid — remove border top on first row jitter */
  .v2-reasons-grid > div { padding-top: 14px !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ── Tweaks Panel ───────────────────────────────────────────────── -->
<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.88);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div className="twk-panel" style={{ right: 16, bottom: 16 }}>
        <div className="twk-hd"><b>{title}</b><button className="twk-x" onClick={() => setOpen(false)}>✕</button></div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRow({ label, children }) {
  return <div className="twk-row"><div className="twk-lbl"><span>{label}</span></div>{children}</div>;
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = React.useRef(null);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className="twk-seg">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

const WAITLIST_HREF = 'https://o2714115.typeform.com/to/nODjX1wu';
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakRadio, WAITLIST_HREF });
</script>

<!-- ── V2 Palette + Illustrations ────────────────────────────────── -->
<script type="text/babel">
const V2 = {
  ink:        '#1B1714',
  paper:      '#F5EEDF',
  cream:      '#EFE7D2',
  pink:       '#F0C2A8',
  pinkSoft:   '#F7DDCC',
  forest:     '#1F2F1F',
  forestSoft: '#3A4F38',
  sage:       '#4F6042',
  hydrate:    '#1E3A5F',
  fuel:       '#E2A434',
  terracotta: '#D85E27',
};

function HandUnderline({ width = 220, color = V2.terracotta, style }) {
  return (
    <svg viewBox="0 0 220 16" width={width} height={Math.round(16 * width / 220)}
         style={{ display: 'block', ...style }} aria-hidden="true">
      <path d="M 4 10 C 30 4 60 12 100 7 C 140 3 180 11 216 6"
            fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function HandSquiggle({ size = 80, color = V2.ink, style }) {
  return (
    <svg viewBox="0 0 80 100" width={size} height={Math.round(size * 100 / 80)}
         style={{ display: 'block', ...style }} aria-hidden="true">
      <path d="M 12 14 C 28 6 50 22 42 38 C 36 50 18 48 16 60 C 14 72 36 76 50 70 C 64 64 70 82 58 90"
            fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.55" />
    </svg>
  );
}

function IconSunRays({ size = 28, color = V2.ink, style }) {
  return (
    <svg viewBox="0 0 32 32" width={size} height={size} style={style} aria-hidden="true">
      <circle cx="16" cy="16" r="5" fill="none" stroke={color} strokeWidth="1.5" />
      {Array.from({length: 8}).map((_, i) => {
        const a = (i * Math.PI * 2) / 8;
        return <line key={i} x1={16 + Math.cos(a)*9} y1={16 + Math.sin(a)*9} x2={16 + Math.cos(a)*14} y2={16 + Math.sin(a)*14} stroke={color} strokeWidth="1.5" strokeLinecap="round" />;
      })}
    </svg>
  );
}

function IconScribble({ size = 28, color = V2.ink, style }) {
  return (
    <svg viewBox="0 0 32 32" width={size} height={size} style={style} aria-hidden="true">
      <path d="M 6 16 C 10 8 14 24 18 16 C 22 8 26 24 22 18 C 18 12 8 22 14 24 C 20 26 26 18 24 14"
            fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function IconWaves({ size = 28, color = V2.ink, style }) {
  return (
    <svg viewBox="0 0 36 32" width={size} height={Math.round(size * 32 / 36)} style={style} aria-hidden="true">
      <path d="M 4 12 C 8 8 12 16 16 12 C 20 8 24 16 28 12 C 30 10 32 11 34 12" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" />
      <path d="M 4 20 C 8 16 12 24 16 20 C 20 16 24 24 28 20 C 30 18 32 19 34 20" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" />
    </svg>
  );
}

function IconSquare({ size = 28, color = V2.ink, style }) {
  return (
    <svg viewBox="0 0 32 32" width={size} height={size} style={style} aria-hidden="true">
      <path d="M 7 8 L 24 7 L 25 24 L 8 25 Z" fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
    </svg>
  );
}

function FeaturePill({ kind, size = 22, color = V2.ink }) {
  if (kind === 'group') return (
    <svg viewBox="0 0 28 24" width={size + 4} height={size} aria-hidden="true">
      <circle cx="10" cy="9" r="4" fill="none" stroke={color} strokeWidth="1.5"/>
      <circle cx="20" cy="9" r="4" fill="none" stroke={color} strokeWidth="1.5"/>
      <path d="M 3 22 C 5 16 15 16 17 22" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <path d="M 13 22 C 15 16 25 16 27 22" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
  if (kind === 'calendar') return (
    <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
      <rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke={color} strokeWidth="1.5"/>
      <line x1="3" y1="10" x2="21" y2="10" stroke={color} strokeWidth="1.5"/>
      <line x1="8" y1="3" x2="8" y2="7" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <line x1="16" y1="3" x2="16" y2="7" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
  if (kind === 'check') return (
    <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
      <circle cx="12" cy="12" r="9" fill="none" stroke={color} strokeWidth="1.5"/>
      <path d="M 8 12.5 L 11 15.5 L 16.5 9.5" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  if (kind === 'heart') return (
    <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
      <path d="M 12 20 C 4 14 4 8 7 6 C 9.5 4.4 12 6 12 9 C 12 6 14.5 4.4 17 6 C 20 8 20 14 12 20 Z"

/* ── Composer ── */
function CapacityClubV2() {
  React.useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('v2-visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -48px 0px' });
    document.querySelectorAll('.v2-scroll-reveal, .v2-stagger').forEach((el) => obs.observe(el));

    const onScroll = () => {
      const parallax = document.querySelector('.v2-hero-parallax');
      if (!parallax) return;
      const hero = parallax.closest('section');
      const rect = hero.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > window.innerHeight) return;
      const progress = Math.max(0, Math.min(1, 1 - rect.bottom / (rect.height + window.innerHeight)));
      parallax.style.transform = `translateY(${progress * -48}px)`;
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    return () => { obs.disconnect(); window.removeEventListener('scroll', onScroll); };
  }, []);

  return (
    <div className="cc-v2" style={{ minHeight: '100%', background: V2.paper, color: V2.ink, fontFamily: '"DM Sans", system-ui, sans-serif', fontSize: 17, lineHeight: 1.55 }}>
      <NavV2 />

      <ResultsV2 />
      <TestimonialsV2 />
      <WhoForV2 />
      <WhatHappensNextV2 />
      <WhyFoundedV2 />
      <FinalCtaV2 />
      <FooterV2 />
    </div>
  );
}

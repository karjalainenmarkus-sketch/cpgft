<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found — CPG FastTrack</title>
  <link rel="icon" href="/assets/favicon-cpgft.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .page-404 {
      min-height: 100vh;
      background: #004534;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .page-404-eyebrow {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--lime);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .page-404 h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 800;
      color: #fff;
      line-height: 1;
      margin: 0 0 8px;
    }
    .page-404-sub {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(16px, 2vw, 20px);
      color: rgba(255,255,255,0.65);
      margin: 0 0 40px;
      max-width: 420px;
    }
    .page-404-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="page-404">
    <a href="/" style="display:inline-block;margin-bottom:48px;">
      <img src="/assets/cpgft-logo.svg" alt="CPG FastTrack" style="height:36px;filter:brightness(0) invert(1);">
    </a>
    <div class="page-404-eyebrow">404 — Page not found</div>
    <h1>Wrong shelf.</h1>
    <p class="page-404-sub">This page doesn't exist. Try one of these instead.</p>
    <div class="page-404-links">
      <a href="/" class="btn btn-lime">For Founders</a>
      <a href="/cpg-professionals" class="btn btn-outline-white">For CPG Professionals</a>
      <a href="/events" class="btn btn-outline-white">Free Events</a>
    </div>
  </div>
</body>
</html>
